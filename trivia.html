<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trivia Game</title>
</head>
<body>

<h1>Trivia Game 🎯</h1>
<button onclick="startGame()">Start Trivia</button>

<script>
// Start function so it runs on button click
function startGame() {

    // Choose difficulty
    let Difficulty = prompt("Welcome to Trivia, would you like to play on Easy, Medium, or Hard?");

    // Display rules
    alert("Rules");
    alert("1. Only capitalize the first letter of the first word for the answer");
    alert("2. If the answer is a number and it is over 100 put it in numerical form ex: 100 not one-hundred");
    alert("3. Have fun!");

    console.log("Results");
    console.log("----------------------");

    // Function to ask questions
    function askQuestions(questions, answers){
        let score = 0;

        for (let i = 0; i < questions.length; i++) {
            let choice = prompt(questions[i]);

            if (choice === answers[i]) {
                alert("Correct!");
                score++;
            } else {
                alert("Incorrect! The answer was " + answers[i]);
            }
        }

        return score;
    }

    // Main trivia function
    function triviaTime (Difficulty) {
        let score = 0;

        if (Difficulty == "Easy") {

            let easyQuestions = [
                "How many eyes does the average spider have?", 
                "Which US state is largest in size?",
                "What is the sum of the angles in a trapezoid?",
                "What is the biggest ocean? (Remember to put ocean in your answer!)",
                "What is the capital city of Japan?",
                "Which gaming company invented the Wii?",
                "What is the fourth planet from the Sun?",
                "Which element is represented as K on the Periodic Table?",
                "What device uses sunlight to tell time?",
                "What state is Dorothy from in The Wizard of Oz?"
            ];

            let easyAnswers = [
                "Eight", "Alaska", "360", "Pacific ocean", "Tokyo",
                "Nintendo", "Mars", "Potassium", "Sundial", "Kansas"
            ];

            score = askQuestions(easyQuestions, easyAnswers);

        } 
        else if (Difficulty == "Medium") {

            let medQuestions = [
                "What fast food chain has the most locations in America?",
                "What is the smallest ocean? (Remember to put ocean in your answer!)",
                "What was the first sport played on the moon?",
                "What is the biggest planet in our solar system?",
                "What substance did the Romans use as mouthwash?",
                "What is a group of pandas called?",
                "What is the star sign of someone born on Valentines day?",
                "In which year did World War II end?",
                "What is the chemical symbol for gold?",
                "Which country has the largest population?"
            ];

            let medAnswers = [
                "Subway", "Arctic ocean", "Golf", "Jupiter", "Urine",
                "Embarrassment", "Aquarius", "1945", "Au", "China"
            ];

            score = askQuestions(medQuestions, medAnswers);

        } 
        else if (Difficulty == "Hard") {

            let hardQuestions = [
                "In a standard set of playing cards, which is the only king without a moustache?",
                "What’s the Capital of Paraguay?",
                "Which English city was once known as Duroliponte?",
                "Who won the first football World Cup?",
                "Which country has the most fresh water?",
                "What nickname was given to the Serial Killer Jack the Ripper?",
                "What’s the smallest bone in the human body?",
                "Which mineral is commonly known as Fools' Gold?",
                "In what year was the Gregorian calendar adopted?",
                "Which branch of mathematics gets its name from the Arabic word for reuniting?"
            ];

            let hardAnswers = [
                "King of hearts", "Asuncion", "Cambridge", "Uruguay", "Brazil",
                "Whitechapel murder", "Stapes", "Pyrite", "1582", "Algebra"
            ];

            score = askQuestions(hardQuestions, hardAnswers);
        }

        // Final score
        console.log("You got " + score + " right!");
        alert("You got " + score + " right!");
    }

    // Run trivia
    triviaTime(Difficulty);
}
</script>

</body>
</html>
